<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont,
                   'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
      color: #333;
    }

    /* ── App Container ─────────────────────────────────────── */
    .app {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 32px 28px 28px;
      text-align: center;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .header p {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ── Input Area ────────────────────────────────────────── */
    .input-area {
      display: flex;
      padding: 24px 24px 0;
      gap: 10px;
    }

    #todo-input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      color: #334155;
    }

    #todo-input::placeholder {
      color: #94a3b8;
    }

    #todo-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    #add-btn {
      padding: 14px 22px;
      background: #6366f1;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #add-btn:hover {
      background: #4f46e5;
    }

    #add-btn:active {
      transform: scale(0.97);
    }

    /* ── Todo List ──────────────────────────────────────────── */
    #todo-list {
      list-style: none;
      padding: 16px 24px 24px;
      min-height: 120px;
    }

    #todo-list:empty::after {
      content: "No todos yet. Add one above!";
      display: block;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f8fafc;
      border-radius: 10px;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .todo-item:hover {
      background: #f1f5f9;
    }

    .todo-item input[type="checkbox"] {
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .todo-item input[type="checkbox"]:checked {
      background: #6366f1;
      border-color: #6366f1;
    }

    .todo-item input[type="checkbox"]:checked::after {
      content: "\2713";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }

    .todo-item span {
      flex: 1;
      font-size: 0.95rem;
      color: #334155;
      transition: color 0.2s, text-decoration 0.2s;
    }

    .todo-item.completed span {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .todo-item .delete-btn:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      padding: 16px 24px;
      border-top: 1px solid #f1f5f9;
      text-align: center;
      color: #94a3b8;
      font-size: 0.8rem;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 480px) {
      body {
        padding: 30px 12px;
      }
      .header {
        padding: 24px 20px 20px;
      }
      .input-area {
        padding: 16px 16px 0;
        flex-direction: column;
      }
      #todo-list {
        padding: 12px 16px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>Todo App</h1>
      <p>Stay organized, get things done</p>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input
        type="text"
        id="todo-input"
        placeholder="What needs to be done?"
        aria-label="New todo text"
        autocomplete="off"
      >
      <button id="add-btn" type="button">Add</button>
    </div>

    <!-- Todo List Container -->
    <ul id="todo-list"></ul>

    <!-- Footer -->
    <div class="footer">
      <span id="todo-count">0 items</span>
    </div>
  </div>

  <script>
    // ── DOM refs ────────────────────────────────────────────
    const input   = document.getElementById('todo-input');
    const addBtn  = document.getElementById('add-btn');
    const list    = document.getElementById('todo-list');
    const counter = document.getElementById('todo-count');

    // ── Helpers ─────────────────────────────────────────────
    function updateCount() {
      const total     = list.querySelectorAll('.todo-item').length;
      const remaining = list.querySelectorAll('.todo-item:not(.completed)').length;
      counter.textContent = remaining === 1
        ? '1 item left'
        : remaining + ' items left';
    }

    function createTodoItem(text) {
      const li = document.createElement('li');
      li.className = 'todo-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.setAttribute('aria-label', 'Mark as complete');
      cb.addEventListener('change', () => {
        li.classList.toggle('completed', cb.checked);
        updateCount();
      });

      const span = document.createElement('span');
      span.textContent = text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.innerHTML = '&times;';
      del.setAttribute('aria-label', 'Delete todo');
      del.addEventListener('click', () => {
        li.remove();
        updateCount();
      });

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      return li;
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      list.appendChild(createTodoItem(text));
      input.value = '';
      input.focus();
      updateCount();
    }

    // ── Events ──────────────────────────────────────────────
    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    // Initial count
    updateCount();
  </script>
</body>
</html>
